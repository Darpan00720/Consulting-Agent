# Pre-commit hooks mirror the `make check` gate. `make check` remains the
# canonical gate; these hooks enforce it at commit time.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
  - repo: https://github.com/psf/black
    rev: 24.8.0
    hooks:
      - id: black
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        additional_dependencies: [pydantic>=2.7, pydantic-settings>=2.3]
        args: [--config-file=pyproject.toml]
