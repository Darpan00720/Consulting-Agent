services:
  backend:
    build:
      context: ../../   # repo root — Dockerfile needs agents/ and knowledge-vault/
      dockerfile: apps/dashboard/backend/Dockerfile
    environment:
      # Provider failover chain: Gemini → OpenRouter → Groq. Any subset works;
      # providers without a key are skipped.
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      STRATAGENT_DAILY_QUOTA: ${STRATAGENT_DAILY_QUOTA:-5}
      STRATAGENT_AGENTS_DIR: /agents
      STRATAGENT_VAULT_DIR: /vault
    volumes:
      # Persist the SQLite database between restarts
      - backend_data:/app/data
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend_data:
